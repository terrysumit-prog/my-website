
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Website</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #0f172a;
    color: white;
    margin: 0;
}

nav {
    background: #1e293b;
    padding: 15px;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    margin-top: 80px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.start { background: green; color: white; }
.stop { background: orange; color: white; }
.reset { background: red; color: white; }

#timer {
    font-size: 40px;
    margin: 20px;
}
</style>

</head>
<body>

<nav>
    <a href="#" onclick="showPage('home')">Home</a>
    <a href="#" onclick="showPage('timer')">Timer</a>
    <a href="#" onclick="showPage('about')">About</a>
</nav>

<!-- HOME PAGE -->
<div id="home" class="container">
    <h1>Welcome</h1>
    <button class="start" onclick="showPage('timer')">Start Timer</button>
</div>

<!-- TIMER PAGE -->
<div id="timerPage" class="container" style="display:none;">
    <h1>Timer</h1>
    <div id="timer">00:00:00</div>

    <button class="start" onclick="startTimer()">Start</button>
    <button class="stop" onclick="stopTimer()">Stop</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
</div>

<!-- ABOUT PAGE -->
<div id="about" class="container" style="display:none;">
    <h1>About</h1>
    <p>This is a simple timer website created using HTML, CSS, and JavaScript.</p>
</div>

<script>
let seconds = 0;
let timer;
let running = false;

function updateDisplay() {
    let hrs = Math.floor(seconds / 3600);
    let mins = Math.floor((seconds % 3600) / 60);
    let secs = seconds % 60;

    document.getElementById("timer").innerText =
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0');
}

function startTimer() {
    if (!running) {
        running = true;
        timer = setInterval(() => {
            seconds++;
            updateDisplay();
        }, 1000);
    }
}

function stopTimer() {
    running = false;
    clearInterval(timer);
}

function resetTimer() {
    running = false;
    clearInterval(timer);
    seconds = 0;
    updateDisplay();
}

function showPage(page) {
    document.getElementById("home").style.display = "none";
    document.getElementById("timerPage").style.display = "none";
    document.getElementById("about").style.display = "none";

    if (page === "home") {
        document.getElementById("home").style.display = "block";
    } else if (page === "timer") {
        document.getElementById("timerPage").style.display = "block";
    } else {
        document.getElementById("about").style.display = "block";
    }
}
</script>

</body>
</html>
