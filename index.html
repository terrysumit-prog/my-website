
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POP POP</title></title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

button {
  background: green;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

.cart {
  padding: 20px;
  background: white;
  margin: 20px;
}
</style>
</head>

<body>

<header>
  <h2>My Online Store</h2>
  <h3>Cart: <span id="cart-count">0</span></h3>
</header>

<div class="products" id="product-list"></div>

<div class="cart">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let products = [
  {id:1, name:"T-Shirt", price:499},
  {id:2, name:"Shoes", price:999},
  {id:3, name:"Watch", price:1499},
  {id:4, name:"Cap", price:299}
];

let cart = [];

function loadProducts() {
  let container = document.getElementById("product-list");

  products.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(id) {
  let product = products.find(p => p.id === id);
  cart.push(product);
  document.getElementById("cart-count").innerText = cart.length;
  displayCart();
}

function displayCart() {
  let list = document.getElementById("cart-items");
  list.innerHTML = "";

  cart.forEach(item => {
    list.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });
}

function checkout() {
  alert("Order placed successfully ✅ (Demo)");
}

loadProducts();
</script>

</body>
</html>

  let product = products.find(p => p.id === id);

  list.innerHTML = "";

  cart.forEach(item => {
    list.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });
}

function checkout() {
  if(cart.length === 0){
    alert("Cart empty ❌");
    return;
  }

  orders.push([...cart]);
  localStorage.setItem("orders", JSON.stringify(orders));

  cart = [];
  localStorage.setItem("cart", JSON.stringify(cart));

  loadOrders();
}
